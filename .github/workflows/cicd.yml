name: CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: '3.11'
  DJANGO_SETTINGS_MODULE: lugayetu.settings

jobs:
  lint:
    name: Lint & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies for linting
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install black isort flake8 pylint pytest pytest-cov pytest-django

      - name: Check formatting with Black
        run: python -m black --check .

      - name: Check imports ordering with isort
        run: python -m isort --check-only .

      - name: Run flake8
        run: python -m flake8 .

      - name: Run pylint on Django apps
        run: |
          python -m pylint --disable=R,C,W1203 --load-plugins pylint_django ./core ./translator ./contribution

  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-security-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-security-

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install bandit safety pip-audit

      - name: Run Bandit
        run: python -m bandit -r . -lll

      - name: Run Safety
        run: python -m safety check --full-report

      - name: Run pip-audit
        run: python -m pip_audit --fail-on high

  test:
    name: Django Tests with PostgreSQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: ${{ secrets.POSTGRES_DB }}
      DB_USER: ${{ secrets.POSTGRES_USER }}
      DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DEBUG: 'False'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-test-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-test-

      - name: Install dependencies for tests
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-cov pytest-django

      - name: Wait for PostgreSQL
        run: |
          for i in {1..15}; do
            pg_isready -h 127.0.0.1 -p 5432 -U ${{ secrets.POSTGRES_USER }} && break
            sleep 2
          done

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run Django tests with coverage
        run: pytest --ds=lugayetu.settings --cov=. --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker_build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-layer-cache-${{ github.sha }}
          restore-keys: |
            docker-layer-cache-

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: false
          tags: lugayetu:test
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          build-args: |
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DEBUG=False

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, docker_build]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }}"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_NAME: ${{ secrets.POSTGRES_DB }}
      DB_USER: ${{ secrets.POSTGRES_USER }}
      DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DEBUG: 'False'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-integration-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-integration-

      - name: Install dependencies for integration tests
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-django httpx

      - name: Wait for PostgreSQL
        run: |
          for i in {1..15}; do
            pg_isready -h 127.0.0.1 -p 5432 -U ${{ secrets.POSTGRES_USER }} && break
            sleep 2
          done

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Run integration tests
        run: pytest --ds=lugayetu.settings --maxfail=1 --disable-warnings -q
